<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Book edit form</title>
    <style type="text/css">
        body {
            padding: 50px;
        }

        label {
            display: inline-block;
            width: 100px;
        }

        input:read-only {
            background: lightgray;
        }

        .row {
            margin-top: 10px;
        }
    </style>
</head>
<body>
<h3>Book edit form</h3>

<form id="book-edit-form">
    <table class="edit-form">
        <thead>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <!--        <th>Action</th>-->
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}" th:object="${book}">
            <td><input type="text" th:value="*{title}" value="" placeholder="Название"></td>
            <td>
                <select name="authorId" id="authorId">
                    <option value="" disabled th:text="Author name" selected></option>
                    <option
                            th:each="author : ${authors}"
                            th:object="${author}"
                            value=""
                            th:value="*{id}"
                            th:text="*{fullName}"></option>
                </select>
            </td>
            <td>
                <select name="genreId" id="genreId">
                    <option value="" disabled th:text="Genre name" selected></option>
                    <option
                            th:each="genre : ${genres}"
                            th:object="${genre}"
                            value=""
                            th:value="*{id}"
                            th:text="*{name}"></option>
                </select>
            </td>
        </tr>
        </tbody>
    </table>
</form>

</body>
</html>
